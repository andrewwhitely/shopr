name = "shopr-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "shopr-db"
database_id = "2517422e-ee3f-41ef-923c-9cad7987a611"

# Secrets — set via: wrangler secret put <NAME>
# For Management API (profile update): wrangler secret put AUTH0_MGMT_CLIENT_SECRET
# (Or AUTH0_CLIENT_SECRET if using same M2M app for JWT validation)

[vars]
AUTH0_DOMAIN = "auth.lunchbox.studio"
AUTH0_TENANT_DOMAIN = "dev-o2g1z2gmea57iivc.us.auth0.com"
AUTH0_AUDIENCE = "https://api.shopr.app"
AUTH0_CLIENT_ID = "oym0fIdj7otuqB6kOBK2oglKTTKnqIGg"

[env.production.vars]
